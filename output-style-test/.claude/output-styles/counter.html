<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카운터 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-2xl p-8 w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">카운터</h1>

        <!-- 숫자 표시 영역 -->
        <div class="bg-gradient-to-r from-blue-500 to-indigo-600 rounded-lg p-8 mb-8 text-center">
            <p class="text-blue-100 text-sm font-semibold mb-2">현재 카운트</p>
            <p id="counter-display" class="text-6xl font-bold text-white">0</p>
        </div>

        <!-- 버튼 영역 -->
        <div class="space-y-3">
            <!-- 증가 버튼 -->
            <button
                onclick="increaseCounter()"
                class="w-full bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105 active:scale-95"
            >
                + 1 증가
            </button>

            <!-- 감소 버튼 -->
            <button
                onclick="decreaseCounter()"
                class="w-full bg-blue-400 hover:bg-blue-500 active:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105 active:scale-95"
            >
                - 1 감소
            </button>

            <!-- 리셋 버튼 -->
            <button
                onclick="resetCounter()"
                class="w-full bg-slate-400 hover:bg-slate-500 active:bg-slate-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105 active:scale-95"
            >
                리셋
            </button>
        </div>
    </div>

    <script>
        // 초기 카운터 값
        let count = 0;

        // 숫자를 화면에 표시하는 함수
        function updateDisplay() {
            document.getElementById('counter-display').textContent = count;
        }

        // 증가 함수: 카운트를 1 증가시키고 화면 업데이트
        function increaseCounter() {
            count++;
            updateDisplay();
        }

        // 감소 함수: 카운트를 1 감소시키고 화면 업데이트
        function decreaseCounter() {
            count--;
            updateDisplay();
        }

        // 리셋 함수: 카운트를 0으로 초기화하고 화면 업데이트
        function resetCounter() {
            count = 0;
            updateDisplay();
        }
    </script>
</body>
</html>
