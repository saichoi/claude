<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>할 일 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-50 to-blue-100 min-h-screen p-4">
    <div class="max-w-2xl mx-auto">
        <!-- 제목 -->
        <h1 class="text-4xl font-bold text-gray-800 mb-8 text-center">📝 할 일 목록</h1>

        <!-- 입력 카드 -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <div class="flex gap-2">
                <input
                    type="text"
                    id="todo-input"
                    placeholder="새로운 할 일을 입력하세요..."
                    class="flex-1 px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 transition"
                    onkeypress="if(event.key === 'Enter') addTodo()"
                />
                <button
                    onclick="addTodo()"
                    class="bg-purple-500 hover:bg-purple-600 active:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200 transform hover:scale-105 active:scale-95"
                >
                    추가
                </button>
            </div>
        </div>

        <!-- 할 일 목록 카드 -->
        <div class="bg-white rounded-lg shadow-lg overflow-hidden">
            <div id="todo-list" class="divide-y divide-gray-200">
                <!-- 할 일 항목들이 여기에 추가됨 -->
                <div class="p-6 text-center text-gray-400">
                    할 일을 추가해보세요! ✨
                </div>
            </div>
        </div>

        <!-- 통계 -->
        <div class="mt-6 grid grid-cols-2 gap-4">
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <p class="text-gray-600 text-sm">전체 할 일</p>
                <p id="total-count" class="text-3xl font-bold text-purple-600">0</p>
            </div>
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <p class="text-gray-600 text-sm">완료된 할 일</p>
                <p id="completed-count" class="text-3xl font-bold text-green-600">0</p>
            </div>
        </div>
    </div>

    <script>
        // 할 일 데이터를 저장하는 배열
        let todos = [];
        let nextId = 1;

        // 할 일 추가 함수
        function addTodo() {
            const input = document.getElementById('todo-input');
            const text = input.value.trim();

            // 빈 입력 검증
            if (!text) {
                alert('할 일을 입력해주세요!');
                return;
            }

            // 새로운 할 일 객체 생성
            const todo = {
                id: nextId++,
                text: text,
                completed: false
            };

            todos.push(todo);
            input.value = '';
            input.focus();

            renderTodos();
        }

        // 할 일 완료 토글 함수
        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                renderTodos();
            }
        }

        // 할 일 삭제 함수
        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            renderTodos();
        }

        // 통계 업데이트 함수
        function updateStats() {
            const totalCount = todos.length;
            const completedCount = todos.filter(t => t.completed).length;

            document.getElementById('total-count').textContent = totalCount;
            document.getElementById('completed-count').textContent = completedCount;
        }

        // 할 일 목록 렌더링 함수
        function renderTodos() {
            const todoList = document.getElementById('todo-list');

            // 할 일이 없으면 빈 상태 메시지 표시
            if (todos.length === 0) {
                todoList.innerHTML = '<div class="p-6 text-center text-gray-400">할 일을 추가해보세요! ✨</div>';
                updateStats();
                return;
            }

            // 각 할 일을 HTML로 변환
            todoList.innerHTML = todos.map(todo => `
                <div class="p-4 flex items-center gap-3 hover:bg-gray-50 transition">
                    <!-- 체크박스 -->
                    <input
                        type="checkbox"
                        ${todo.completed ? 'checked' : ''}
                        onchange="toggleTodo(${todo.id})"
                        class="w-5 h-5 text-purple-500 rounded cursor-pointer"
                    />

                    <!-- 할 일 텍스트 -->
                    <span class="flex-1 text-lg ${todo.completed ? 'line-through text-gray-400' : 'text-gray-800'}">
                        ${escapeHtml(todo.text)}
                    </span>

                    <!-- 삭제 버튼 -->
                    <button
                        onclick="deleteTodo(${todo.id})"
                        class="bg-red-500 hover:bg-red-600 active:bg-red-700 text-white px-3 py-1 rounded transition duration-200"
                    >
                        삭제
                    </button>
                </div>
            `).join('');

            updateStats();
        }

        // HTML 특수문자 이스케이프 (XSS 방지)
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 초기 렌더링
        renderTodos();
    </script>
</body>
</html>
