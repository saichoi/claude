<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투두 리스트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:active {
            transform: scale(0.98);
        }

        .todo-list {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
            margin-bottom: 10px;
            gap: 10px;
            transition: background 0.3s;
        }

        .todo-item:hover {
            background: #f0f1f3;
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed span {
            text-decoration: line-through;
            color: #999;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .todo-item span {
            flex: 1;
            color: #333;
            font-size: 16px;
        }

        .delete-btn {
            padding: 8px 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: #ff5252;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 투두 리스트</h1>

        <div class="input-container">
            <input
                type="text"
                id="todoInput"
                placeholder="새로운 할 일을 입력하세요..."
                autocomplete="off"
            >
            <button onclick="addTodo()">추가</button>
        </div>

        <ul class="todo-list" id="todoList">
            <div class="empty-message">아직 할 일이 없습니다</div>
        </ul>
    </div>

    <script>
        const todoInput = document.getElementById('todoInput');
        const todoList = document.getElementById('todoList');

        function addTodo() {
            const text = todoInput.value.trim();
            if (!text) return;

            const li = document.createElement('li');
            li.className = 'todo-item';
            li.innerHTML = `
                <input type="checkbox" onchange="toggleTodo(this)">
                <span>${escapeHtml(text)}</span>
                <button class="delete-btn" onclick="deleteTodo(this)">삭제</button>
            `;

            if (todoList.querySelector('.empty-message')) {
                todoList.innerHTML = '';
            }

            todoList.appendChild(li);
            todoInput.value = '';
            todoInput.focus();
        }

        function deleteTodo(btn) {
            btn.closest('.todo-item').remove();
            if (todoList.children.length === 0) {
                todoList.innerHTML = '<div class="empty-message">아직 할 일이 없습니다</div>';
            }
        }

        function toggleTodo(checkbox) {
            checkbox.closest('.todo-item').classList.toggle('completed');
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        todoInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') addTodo();
        });
    </script>
</body>
</html>
